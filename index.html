<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nativa FM - O amor de Entre Folhas</title>
    <style>
        :root {
            --bg-color: #0d0f13;
            --surface-color: #1a1d24;
            --primary-color: #00ff88;
            --primary-glow: rgba(0, 255, 136, 0.4);
            --danger-color: #ff3366;
            --warning-color: #ffcc00;
            --text-main: #ffffff;
            --text-secondary: #8e95a5;
            --led-off: #2a2d35;
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background: linear-gradient(135deg, var(--bg-color) 0%, #161a22 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Animation */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 20s infinite ease-in-out;
        }

        .bg-circle:nth-child(1) {
            width: 400px;
            height: 400px;
            background: var(--primary-color);
            top: -100px;
            left: -100px;
        }

        .bg-circle:nth-child(2) {
            width: 500px;
            height: 500px;
            background: var(--danger-color);
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
        }

        /* App Container */
        .app-container {
            position: relative;
            z-index: 1;
            background: var(--surface-color);
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 15px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--danger-color);
            background: rgba(255, 51, 102, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: var(--danger-color);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 51, 102, 0.7); }
            70% { opacity: 0.5; box-shadow: 0 0 0 6px rgba(255, 51, 102, 0); }
            100% { opacity: 1; box-shadow: 0 0 0 0 rgba(255, 51, 102, 0); }
        }

        .clock {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
        }

        /* Radio Info */
        .radio-info {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .radio-slogan {
            font-size: 1rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .status-text {
            font-size: 0.85rem;
            color: var(--primary-color);
            margin-top: 5px;
            font-weight: 500;
        }

        /* VU Meter Container */
        .vu-container {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .channel {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .channel-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-secondary);
            width: 15px;
        }

        .led-strip {
            display: flex;
            gap: 4px;
            flex: 1;
        }

        .led {
            flex: 1;
            height: 12px;
            background-color: var(--led-off);
            border-radius: 2px;
            transition: background-color 0.05s ease, box-shadow 0.05s ease;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }

        .btn {
            background: none;
            border: none;
            cursor: pointer;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .btn-play {
            width: 64px;
            height: 64px;
            background: var(--primary-color);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .btn-play:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .btn-play svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            margin-left: 4px; /* Optical alignment */
        }

        .btn-stop {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .btn-stop:hover {
            background: rgba(255, 51, 102, 0.2);
            color: var(--danger-color);
        }

        .btn-stop svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .btn.active-state {
            pointer-events: none;
            opacity: 0.5;
        }

        /* Volume Control */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 20px;
            border-radius: 12px;
        }

        .volume-icon {
            color: var(--text-secondary);
            width: 20px;
            height: 20px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: var(--led-off);
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Overlay / Fallback */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 15, 19, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .overlay-icon {
            width: 60px;
            height: 60px;
            color: var(--primary-color);
            margin-bottom: 15px;
            animation: pulse-icon 2s infinite;
        }

        @keyframes pulse-icon {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .overlay-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .overlay-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .btn-start {
            background: var(--primary-color);
            color: var(--bg-color);
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary-glow);
            transition: transform 0.2s;
        }

        .btn-start:hover {
            transform: scale(1.05);
        }

        /* Responsive */
        @media (max-width: 500px) {
            .app-container {
                min-height: 100vh;
                border-radius: 0;
                justify-content: center;
                padding: 20px;
            }
            .overlay {
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
    </div>

    <div class="app-container">
        <!-- Autoplay Fallback Overlay -->
        <div class="overlay" id="interaction-overlay">
            <svg class="overlay-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polygon points="10 8 16 12 10 16 10 8"></polygon>
            </svg>
            <h2 class="overlay-title">Bem-vindo à Nativa FM</h2>
            <p class="overlay-text">Clique no botão abaixo para sintonizar e liberar o áudio.</p>
            <button class="btn-start" onclick="handleUserInteraction()">Sintonizar Agora</button>
        </div>

        <header class="header">
            <div class="live-indicator">
                <div class="pulse" id="pulse-dot"></div>
                <span id="live-text">OFFLINE</span>
            </div>
            <div class="clock" id="digital-clock">00:00:00</div>
        </header>

        <section class="radio-info">
            <h1 class="radio-title">Nativa FM</h1>
            <p class="radio-slogan">"O amor de Entre Folhas"</p>
            <p class="status-text" id="stream-status">Carregando player...</p>
        </section>

        <!-- Stereo VU Meter -->
        <section class="vu-container">
            <div class="channel">
                <span class="channel-label">L</span>
                <div class="led-strip" id="vu-l">
                    <!-- LEDs generated via JS -->
                </div>
            </div>
            <div class="channel">
                <span class="channel-label">R</span>
                <div class="led-strip" id="vu-r">
                    <!-- LEDs generated via JS -->
                </div>
            </div>
        </section>

        <section class="controls">
            <button class="btn btn-play" id="btn-play" onclick="playAudio()" aria-label="Play">
                <svg viewBox="0 0 24 24">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
            </button>
            <button class="btn btn-stop" id="btn-stop" onclick="stopAudio()" aria-label="Stop">
                <svg viewBox="0 0 24 24">
                    <rect x="6" y="6" width="12" height="12"></rect>
                </svg>
            </button>
        </section>

        <section class="volume-container">
            <svg class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8">
        </section>

        <!-- Hidden Audio Element -->
        <audio id="radio-player" crossorigin="anonymous">
            <source src="http://stream.zeno.fm/emcg0pkcf4hvv" type="audio/mpeg">
            Seu navegador não suporta o elemento de áudio.
        </audio>
    </div>

    <script>
        // DOM Elements
        const audio = document.getElementById('radio-player');
        const btnPlay = document.getElementById('btn-play');
        const btnStop = document.getElementById('btn-stop');
        const volumeSlider = document.getElementById('volume-slider');
        const statusText = document.getElementById('stream-status');
        const liveText = document.getElementById('live-text');
        const pulseDot = document.getElementById('pulse-dot');
        const clockElement = document.getElementById('digital-clock');
        const overlay = document.getElementById('interaction-overlay');
        
        // Web Audio API Variables
        let audioCtx;
        let analyserL, analyserR;
        let dataArrayL, dataArrayR;
        let isAudioSetup = false;
        let animationId;
        let smoothVolL = 0;
        let smoothVolR = 0;
        
        // Configs
        const NUM_LEDS = 20;

        // Initialize UI
        function initUI() {
            generateLEDs('vu-l');
            generateLEDs('vu-r');
            updateClock();
            setInterval(updateClock, 1000);
            
            audio.volume = volumeSlider.value;
            
            // Try Autoplay
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    // Autoplay permitted
                    setupWebAudio();
                    updatePlayerState('playing');
                }).catch(error => {
                    // Autoplay blocked - require interaction
                    overlay.classList.add('active');
                    updatePlayerState('stopped');
                    statusText.textContent = "Aguardando inicialização...";
                });
            }
        }

        // Generate VU Meter LEDs
        function generateLEDs(containerId) {
            const container = document.getElementById(containerId);
            for (let i = 0; i < NUM_LEDS; i++) {
                const led = document.createElement('div');
                led.className = 'led';
                container.appendChild(led);
            }
        }

        // Clock Update
        function updateClock() {
            const now = new Date();
            clockElement.textContent = now.toLocaleTimeString('pt-BR');
        }

        // Setup Web Audio API
        function setupWebAudio() {
            if (isAudioSetup) return;
            
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                
                const source = audioCtx.createMediaElementSource(audio);
                const splitter = audioCtx.createChannelSplitter(2);
                
                analyserL = audioCtx.createAnalyser();
                analyserR = audioCtx.createAnalyser();
                
                analyserL.fftSize = 256;
                analyserR.fftSize = 256;
                
                // Routing: Source -> Splitter -> Analysers
                source.connect(splitter);
                splitter.connect(analyserL, 0);
                splitter.connect(analyserR, 1);
                
                // Re-route to speakers
                source.connect(audioCtx.destination);
                
                dataArrayL = new Uint8Array(analyserL.frequencyBinCount);
                dataArrayR = new Uint8Array(analyserR.frequencyBinCount);
                
                isAudioSetup = true;
                drawVUMeter();
            } catch (e) {
                console.error("Web Audio API Error: ", e);
                statusText.textContent = "Erro no visualizador (CORS/AudioContext)";
            }
        }

        // Calculate Average Volume from Frequencies
        function getAverageVolume(array) {
            let values = 0;
            for (let i = 0; i < array.length; i++) {
                values += array[i];
            }
            return values / array.length;
        }

        // VU Meter Animation Loop
        function drawVUMeter() {
            animationId = requestAnimationFrame(drawVUMeter);
            
            if (audio.paused) {
                // Smooth decay when paused
                smoothVolL *= 0.85;
                smoothVolR *= 0.85;
            } else {
                analyserL.getByteFrequencyData(dataArrayL);
                analyserR.getByteFrequencyData(dataArrayR);
                
                // Boost signal visually
                let volL = getAverageVolume(dataArrayL) * 1.8;
                let volR = getAverageVolume(dataArrayR) * 1.8;
                
                // Add some stereo randomness if stream is purely mono or silent gaps
                if (volL === volR && volL > 0) {
                    volL += Math.random() * 5;
                    volR += Math.random() * 5;
                }

                // Smooth out the jumping
                smoothVolL = smoothVolL * 0.6 + volL * 0.4;
                smoothVolR = smoothVolR * 0.6 + volR * 0.4;
            }
            
            updateLEDStrip('vu-l', smoothVolL);
            updateLEDStrip('vu-r', smoothVolR);
        }

        // Update physical LEDs
        function updateLEDStrip(containerId, volume) {
            const maxVol = 255;
            const normalizedVol = Math.min(volume / maxVol, 1);
            const activeLEDs = Math.round(normalizedVol * NUM_LEDS);
            
            const leds = document.querySelectorAll(`#${containerId} .led`);
            
            leds.forEach((led, index) => {
                if (index < activeLEDs) {
                    let color = 'var(--primary-color)'; // Green
                    let shadow = 'var(--primary-glow)';
                    
                    if (index >= NUM_LEDS * 0.8) {
                        color = 'var(--danger-color)'; // Red
                        shadow = 'rgba(255, 51, 102, 0.4)';
                    } else if (index >= NUM_LEDS * 0.6) {
                        color = 'var(--warning-color)'; // Yellow
                        shadow = 'rgba(255, 204, 0, 0.4)';
                    }
                    
                    led.style.backgroundColor = color;
                    led.style.boxShadow = `0 0 8px ${shadow}`;
                } else {
                    led.style.backgroundColor = 'var(--led-off)';
                    led.style.boxShadow = 'none';
                }
            });
        }

        // Player Controls
        function handleUserInteraction() {
            overlay.classList.remove('active');
            playAudio();
        }

        function playAudio() {
            if (!isAudioSetup) {
                setupWebAudio();
            }
            
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            // Force reload stream to avoid stale buffers
            if (audio.paused && audio.currentTime > 0) {
                audio.src = audio.src; 
            }

            audio.play().then(() => {
                updatePlayerState('playing');
            }).catch(e => {
                console.error(e);
                statusText.textContent = "Erro ao conectar. Tente novamente.";
            });
        }

        function stopAudio() {
            audio.pause();
            // Reset stream position for live radio
            audio.currentTime = 0; 
            updatePlayerState('stopped');
        }

        // Volume Change Event
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        // Update UI States
        function updatePlayerState(state) {
            if (state === 'playing') {
                btnPlay.style.transform = "scale(0.9)";
                btnPlay.style.opacity = "0.7";
                btnPlay.style.pointerEvents = "none";
                
                btnStop.style.opacity = "1";
                btnStop.style.pointerEvents = "auto";
                
                liveText.textContent = "AO VIVO";
                liveText.style.color = "var(--primary-color)";
                pulseDot.style.backgroundColor = "var(--primary-color)";
                pulseDot.style.animationPlayState = "running";
                
                statusText.innerHTML = "Tocando Agora | <strong>Sintonia Máxima</strong>";
            } else {
                btnPlay.style.transform = "scale(1)";
                btnPlay.style.opacity = "1";
                btnPlay.style.pointerEvents = "auto";
                
                btnStop.style.opacity = "0.7";
                btnStop.style.pointerEvents = "none";
                
                liveText.textContent = "PAUSADO";
                liveText.style.color = "var(--text-secondary)";
                pulseDot.style.backgroundColor = "var(--text-secondary)";
                pulseDot.style.animationPlayState = "paused";
                
                statusText.textContent = "Transmissão pausada";
            }
        }

        // Audio Events for buffering/network issues
        audio.addEventListener('waiting', () => {
            statusText.textContent = "Carregando buffer...";
        });
        
        audio.addEventListener('playing', () => {
            updatePlayerState('playing');
        });
        
        audio.addEventListener('error', () => {
            statusText.textContent = "Sinal perdido. Reconectando...";
            updatePlayerState('stopped');
        });

        // Boot
        window.addEventListener('load', initUI);

    </script>
</body>
</html>
